services:
  db:
    image: postgres:16-alpine
    container_name: pivotseoul-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pivotseoul}
      POSTGRES_USER: ${POSTGRES_USER:-pivotseoul}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pivotseoul}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  fastapi:
    image: ${FASTAPI_IMAGE:-ghcr.io/bigdata-seoul/pivotseoul-fastapi:latest}
    build:
      context: ./fastapi
    container_name: pivotseoul-fastapi
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  back:
    image: ${BACK_IMAGE:-ghcr.io/bigdata-seoul/pivotseoul-back:latest}
    build:
      context: .
      dockerfile: back/Dockerfile
    container_name: pivotseoul-back
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      fastapi:
        condition: service_started
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-pivotseoul}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-pivotseoul}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      PIVOT_FASTAPI_BASE_URL: http://fastapi:8000
      PIVOT_CORS_ORIGINS: ${PIVOT_CORS_ORIGINS:-http://localhost:3000}
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  front:
    image: ${FRONT_IMAGE:-ghcr.io/bigdata-seoul/pivotseoul-front:latest}
    build:
      context: ./front
    container_name: pivotseoul-front
    restart: unless-stopped
    depends_on:
      back:
        condition: service_started
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://back:8080}
    ports:
      - "${FRONT_PORT:-3000}:3000"
    networks:
      - web

volumes:
  db_data:

networks:
  internal:
    internal: true
  web:
