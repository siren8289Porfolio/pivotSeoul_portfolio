name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push fastapi
        uses: docker/build-push-action@v5
        with:
          context: ./fastapi
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pivotseoul-fastapi:latest

      - name: Build & push back
        uses: docker/build-push-action@v5
        with:
          context: .
          file: back/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pivotseoul-back:latest

      - name: Build & push front
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pivotseoul-front:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: opc
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | sudo /usr/local/bin/docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ~/pivotSeoul
            sudo /usr/local/bin/docker-compose pull
            sudo /usr/local/bin/docker-compose up -d
            echo "배포 완료!"
