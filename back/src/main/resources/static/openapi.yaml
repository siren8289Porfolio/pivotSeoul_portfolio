      properties:
        resultId:
          type: integer
          format: int64
          example: 1
        overallStatus:
          $ref: '#/components/schemas/ThresholdStatus'
        riskScore:
          type: number
          example: 72.5
        summaryText:
          type: string
          example: 강동구로 이동하면 주거비 부담은 완화되지만 통근 시간이 증가합니다.
        thresholdResults:
          type: array
          items:
            $ref: '#/components/schemas/ThresholdResultResponse'
        comparison:
          $ref: '#/components/schemas/ComparisonResponse'
        recoveryLevers:
          type: array
          items:
            $ref: '#/components/schemas/RecoveryLeverResponse'
        weeklyActions:
          type: array
