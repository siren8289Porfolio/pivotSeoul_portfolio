          format: int64
          example: 1
        overallStatus:
          $ref: '#/components/schemas/ThresholdStatus'
        summaryText:
          type: string
          example: 현재 조건에서는 보육 접근성과 주거비 부담이 경계 상태입니다.

    ApiResponseSimulationResultResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SimulationResultResponse'

    SimulationResultResponse:
