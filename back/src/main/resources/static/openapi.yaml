components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      description: 시뮬레이션 세션 ID
      schema:
        type: integer
        format: int64
      example: 1

    ScenarioId:
      name: scenarioId
      in: path
      required: true
      description: 시나리오 ID
      schema:
        type: integer
        format: int64
      example: 1

    ResultId:
      name: resultId
      in: path
      required: true
      description: 시뮬레이션 결과 ID
      schema:
        type: integer
        format: int64
      example: 1

    DatasetId:
      name: datasetId
      in: path
      required: true
      description: 데이터셋 ID
      schema:
        type: integer
        format: int64
      example: 1

  schemas:
    ApiResponseVoid:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 요청이 성공했습니다.
        data:
          nullable: true
          example: null

    LifeStageCode:
      type: string
      enum:
        - YOUTH
        - FAMILY
        - SENIOR
      example: FAMILY

    ScenarioType:
      type: string
      enum:
        - CURRENT
        - COMPARE
      example: CURRENT

    ValueType:
      type: string
      enum:
        - STRING
        - NUMBER
        - BOOLEAN
        - DATE
      example: STRING

    ThresholdStatus:
      type: string
      enum:
        - STABLE
        - WARNING
        - COLLAPSE
      example: WARNING

    AdminRole:
      type: string
      enum:
        - SUPER_ADMIN
        - ADMIN
        - DATA_MANAGER
        - CONTENT_MANAGER
      example: ADMIN

    ApiResponseUserHomeResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/UserHomeResponse'

    UserHomeResponse:
      type: object
      properties:
        title:
          type: string
          example: 주거는 환경이 아니라 생애의 Pivot입니다
        subtitle:
          type: string
          example: 서울시 공공데이터로 내 생애 선택을 미리 비교해보세요.
        lifeStages:
          type: array
          items:
            $ref: '#/components/schemas/LifeStageResponse'
        activeNotices:
          type: array
          items:
            $ref: '#/components/schemas/NoticeResponse'

    ApiResponseLifeStageListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/LifeStageResponse'

    LifeStageResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/LifeStageCode'
        name:
          type: string
          example: 신혼·출산기
        description:
          type: string
          example: 아이 낳고 복직해도 남는 돈이 있을까?
        displayOrder:
          type: integer
          example: 2

    ApiResponseLifeStageDetailResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/LifeStageDetailResponse'

    LifeStageDetailResponse:
      allOf:
        - $ref: '#/components/schemas/LifeStageResponse'
        - type: object
          properties:
            onboardingQuestions:
              type: array
              items:
                type: string
              example:
                - current_district_code
                - household_type
                - child_age
                - return_to_work_month

    ApiResponseDistrictListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/DistrictResponse'

    ApiResponseDistrictResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DistrictResponse'

    DistrictResponse:
      type: object
      properties:
        districtCode:
          type: string
          example: "11710"
        districtName:
          type: string
          example: 송파구
        regionGroup:
          type: string
          example: 동남권

    CreateSessionRequest:
      type: object
      required:
        - lifeStageCode
      properties:
        lifeStageCode:
          $ref: '#/components/schemas/LifeStageCode'

    ApiResponseSessionResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SessionResponse'

    SessionResponse:
      type: object
      properties:
        sessionId:
          type: integer
          format: int64
          example: 1
        sessionUuid:
          type: string
          example: 2b1a6fb3-7d2e-4b79-9bde-4f2632b10c20
        lifeStageCode:
          $ref: '#/components/schemas/LifeStageCode'
        status:
          type: string
          example: CREATED
        expiredAt:
          type: string
          format: date-time
          example: 2026-05-09T15:00:00

    ApiResponseSessionSummaryResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SessionSummaryResponse'

    SessionSummaryResponse:
      type: object
      properties:
        sessionId:
          type: integer
          format: int64
          example: 1
        lifeStageCode:
          $ref: '#/components/schemas/LifeStageCode'
        currentDistrictName:
          type: string
          example: 송파구
        compareDistrictName:
          type: string
          example: 강동구
        onboardingSummary:
          type: object
          additionalProperties:
            type: string
          example:
            household_type: couple_child
            child_age: "2"
            return_to_work_month: "6"
        scenarios:
          type: array
          items:
            $ref: '#/components/schemas/ScenarioResponse'

    CreateOnboardingRequest:
      type: object
      required:
        - lifeStageCode
        - answers
      properties:
        lifeStageCode:
          $ref: '#/components/schemas/LifeStageCode'
        answers:
          type: array
          items:
            $ref: '#/components/schemas/OnboardingAnswerRequest'

    UpdateOnboardingRequest:
      allOf:
        - $ref: '#/components/schemas/CreateOnboardingRequest'

    OnboardingAnswerRequest:
      type: object
      required:
        - questionKey
        - answerValue
        - valueType
      properties:
        questionKey:
          type: string
          example: child_age
        answerValue:
          type: string
          example: "2"
        valueType:
          $ref: '#/components/schemas/ValueType'

    ApiResponseOnboardingSummaryResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/OnboardingSummaryResponse'

    OnboardingSummaryResponse:
      type: object
      properties:
        sessionId:
          type: integer
          format: int64
          example: 1
        lifeStageCode:
          $ref: '#/components/schemas/LifeStageCode'
        answers:
          type: array
          items:
            $ref: '#/components/schemas/OnboardingAnswerResponse'

    OnboardingAnswerResponse:
      type: object
      properties:
        questionKey:
          type: string
          example: child_age
        answerValue:
          type: string
          example: "2"
        valueType:
          $ref: '#/components/schemas/ValueType'

    CreateScenarioRequest:
      type: object
      required:
        - scenarioType
        - title
        - currentDistrictCode
        - variables
      properties:
        scenarioType:
          $ref: '#/components/schemas/ScenarioType'
        title:
          type: string
          example: 현재 조건
        currentDistrictCode:
          type: string
          example: "11710"
        compareDistrictCode:
          type: string
          nullable: true
          example: "11740"
        variables:
          type: array
          items:
            $ref: '#/components/schemas/ScenarioVariableRequest'

    UpdateScenarioRequest:
      allOf:
        - $ref: '#/components/schemas/CreateScenarioRequest'

    ScenarioVariableRequest:
      type: object
      properties:
        variableKey:
          type: string
          example: monthly_income
        variableValue:
          type: string
          example: "5000000"
        valueType:
          $ref: '#/components/schemas/ValueType'

    ApiResponseScenarioResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ScenarioResponse'

    ApiResponseScenarioListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ScenarioResponse'

    ScenarioResponse:
      type: object
      properties:
        scenarioId:
          type: integer
          format: int64
          example: 1
        scenarioType:
          $ref: '#/components/schemas/ScenarioType'
        title:
          type: string
          example: 강동구로 이동
        currentDistrictName:
          type: string
          example: 송파구
        compareDistrictName:
          type: string
          nullable: true
          example: 강동구
        variables:
          type: array
          items:
            $ref: '#/components/schemas/ScenarioVariableResponse'

    ScenarioVariableResponse:
      type: object
      properties:
        variableKey:
          type: string
          example: monthly_income
        variableValue:
          type: string
          example: "5000000"
        valueType:
          $ref: '#/components/schemas/ValueType'

    RunSimulationRequest:
