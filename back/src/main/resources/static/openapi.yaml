openapi: 3.0.3

info:
  title: Pivot Seoul MVP API
  description: |
    MVP 핵심 3기능 API
    - F-001 세션 생성 + 온보딩
    - F-002 RIR 시뮬레이션 실행
    - F-003 결과 조회
  version: 1.0.0-mvp

servers:
  - url: http://localhost:8080
    description: Local Server

tags:
  - name: SimulationSession
  - name: SimulationRun
  - name: SimulationResult
  - name: Health

paths:
  /health:
    get:
      tags: [Health]
      summary: 헬스체크
      responses:
        '200':
          description: OK

  /api/simulation/sessions:
    post:
      tags: [SimulationSession]
      summary: 시뮬레이션 세션 생성 (온보딩)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: 세션 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'

  /api/simulation-sessions/{sessionId}/run:
    post:
      tags: [SimulationRun]
      summary: RIR 시뮬레이션 실행
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunSimulationRequest'
      responses:
        '200':
          description: 실행 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunSimulationResponse'

  /api/simulation/results/{scenarioResultId}:
    get:
      tags: [SimulationResult]
      summary: 시뮬레이션 결과 조회
      parameters:
        - name: scenarioResultId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 결과 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationResultResponse'

components:
  schemas:
    CreateSessionRequest:
      type: object
      required: [lifeStageCode, currentDistrict, monthlyIncome, monthlyHousing]
      properties:
        lifeStageCode:
          type: string
          example: youth
        currentDistrict:
          type: string
          example: 강남구
        compareDistrict:
          type: string
        monthlyIncome:
          type: number
          description: 만원 단위
        monthlyHousing:
          type: number
          description: 만원 단위

    CreateSessionResponse:
      type: object
      properties:
        sessionId:
          type: integer
          format: int64
        sessionUuid:
          type: string
        scenarioId:
          type: integer
          format: int64

    RunSimulationRequest:
      type: object
      properties:
        district:
          type: string
        monthlyIncome:
          type: number
        monthlyHousingCost:
          type: number

    RunSimulationResponse:
      type: object
      properties:
        runStatus:
          type: string
        scenarioResultId:
          type: integer
          format: int64
        rir:
          type: number

    SimulationResultResponse:
      type: object
      properties:
        scenarioResultId:
          type: integer
          format: int64
        riskStatus:
          type: string
        summary:
          type: object
          properties:
            message:
              type: string
            riskScore:
              type: number
            totalScore:
              type: number
        thresholds:
          type: array
          items:
            type: object
            properties:
              calculatedValue:
                type: number
              redZone:
                type: boolean
              summary:
                type: string
