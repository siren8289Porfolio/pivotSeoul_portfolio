openapi: 3.0.3

info:
  title: Pivot Seoul API
  description: |
    서울시 공공데이터 기반 생애 선택 시뮬레이션 서비스 API 명세서입니다.

    사용자 기능:
    - 생애 단계 선택
    - 온보딩 입력
    - A/B 시나리오 설정
    - 시뮬레이션 실행
    - 임계점 / Red Zone / 회복 레버 / 이번 주 할 일 조회

    관리자 기능:
    - 관리자 로그인
    - 데이터셋 관리
    - 콘텐츠 관리
    - 공지 / 점검 관리
    - 로그 / 오류 관리
    - 사용 현황 모니터링
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local Server
  - url: https://api.pivot-seoul.com
    description: Production Server

tags:
  - name: Home
    description: 홈 / 서비스 기본 정보
  - name: LifeStage
    description: 생애 단계
  - name: District
    description: 자치구
  - name: SimulationSession
    description: 시뮬레이션 세션
  - name: Onboarding
    description: 온보딩 입력
  - name: Scenario
    description: A/B 시나리오
  - name: SimulationResult
    description: 시뮬레이션 결과
  - name: Threshold
    description: 임계점 / Red Zone
  - name: Recommendation
    description: 회복 레버 / 이번 주 할 일
  - name: Dataset
    description: 데이터셋 / 데이터 근거
  - name: Content
    description: 콘텐츠 / FAQ / 외부 링크
  - name: AdminAuth
    description: 관리자 인증
  - name: Admin
    description: 관리자 대시보드 / 계정
  - name: AdminDataset
    description: 관리자 데이터셋 관리
  - name: AdminContent
    description: 관리자 콘텐츠 관리
  - name: Analytics
    description: 사용 현황 모니터링
  - name: Log
    description: 로그 / 오류 / AI 이상 탐지

paths:
  /api/home:
    get:
      tags:
        - Home
      summary: 홈 화면 정보 조회
      description: 홈 화면에 필요한 서비스 문구, 생애 단계 카드, 활성 공지를 조회합니다.
      responses:
        '200':
          description: 홈 정보 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserHomeResponse'

  /api/life-stages:
    get:
      tags:
        - LifeStage
      summary: 생애 단계 목록 조회
      description: 청년기, 신혼·출산기, 노년기 목록을 조회합니다.
      responses:
        '200':
          description: 생애 단계 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLifeStageListResponse'

  /api/life-stages/{code}:
    get:
      tags:
        - LifeStage
      summary: 생애 단계 상세 조회
      parameters:
        - name: code
          in: path
          required: true
          description: 생애 단계 코드
          schema:
            $ref: '#/components/schemas/LifeStageCode'
          example: YOUTH
      responses:
        '200':
          description: 생애 단계 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLifeStageDetailResponse'

  /api/districts:
    get:
      tags:
        - District
      summary: 서울시 자치구 목록 조회
      responses:
        '200':
          description: 자치구 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDistrictListResponse'

  /api/districts/{districtCode}:
    get:
      tags:
        - District
      summary: 자치구 상세 조회
      parameters:
        - name: districtCode
          in: path
          required: true
          schema:
            type: string
          example: "11710"
      responses:
        '200':
          description: 자치구 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDistrictResponse'

  /api/simulation-sessions:
    post:
      tags:
        - SimulationSession
      summary: 시뮬레이션 세션 생성
      description: 생애 단계 선택 후 시뮬레이션 세션을 생성합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
            examples:
              youth:
                summary: 청년기 세션 생성
                value:
                  lifeStageCode: YOUTH
              family:
                summary: 신혼·출산기 세션 생성
                value:
                  lifeStageCode: FAMILY
      responses:
        '201':
          description: 세션 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSessionResponse'

  /api/simulation-sessions/{sessionId}:
    get:
      tags:
        - SimulationSession
      summary: 시뮬레이션 세션 조회
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: 세션 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSessionResponse'

  /api/simulation-sessions/{sessionId}/summary:
    get:
      tags:
        - SimulationSession
      summary: 입력값 확인 화면 요약 조회
      description: 온보딩, 시나리오 A/B 설정값을 결과 실행 전 요약합니다.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: 세션 요약 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSessionSummaryResponse'

  /api/simulation-sessions/{sessionId}/onboarding:
    post:
      tags:
        - Onboarding
      summary: 온보딩 입력값 저장
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOnboardingRequest'
            examples:
              youth:
                summary: 청년기 온보딩
                value:
                  lifeStageCode: YOUTH
                  answers:
                    - questionKey: current_district_code
                      answerValue: "11710"
                      valueType: STRING
                    - questionKey: target_job
                      answerValue: "백엔드 개발자"
                      valueType: STRING
                    - questionKey: skill_level
                      answerValue: "BEGINNER"
                      valueType: STRING
                    - questionKey: available_learning_hours_week
                      answerValue: "10"
                      valueType: NUMBER
              family:
                summary: 신혼·출산기 온보딩
                value:
                  lifeStageCode: FAMILY
                  answers:
                    - questionKey: current_district_code
                      answerValue: "11710"
                      valueType: STRING
                    - questionKey: household_type
                      answerValue: "COUPLE_CHILD"
                      valueType: STRING
                    - questionKey: child_age
                      answerValue: "2"
                      valueType: NUMBER
                    - questionKey: return_to_work_month
                      answerValue: "6"
                      valueType: NUMBER
      responses:
        '201':
          description: 온보딩 저장 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOnboardingSummaryResponse'

    get:
      tags:
        - Onboarding
      summary: 온보딩 입력값 조회
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: 온보딩 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOnboardingSummaryResponse'

    patch:
      tags:
        - Onboarding
      summary: 온보딩 입력값 수정
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOnboardingRequest'
      responses:
        '200':
          description: 온보딩 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOnboardingSummaryResponse'

  /api/simulation-sessions/{sessionId}/scenarios:
    post:
      tags:
        - Scenario
      summary: 시나리오 생성
      description: 현재 조건 또는 비교 조건 시나리오를 생성합니다.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScenarioRequest'
            examples:
              current:
                summary: 현재 조건 시나리오
                value:
                  scenarioType: CURRENT
                  title: 현재 조건
                  currentDistrictCode: "11710"
                  compareDistrictCode: null
                  variables:
                    - variableKey: monthly_income
                      variableValue: "5000000"
                      valueType: NUMBER
                    - variableKey: monthly_housing_cost
                      variableValue: "1800000"
                      valueType: NUMBER
              compare:
                summary: 비교 조건 시나리오
                value:
                  scenarioType: COMPARE
                  title: 강동구로 이동
                  currentDistrictCode: "11710"
                  compareDistrictCode: "11740"
                  variables:
                    - variableKey: monthly_income
                      variableValue: "5000000"
                      valueType: NUMBER
                    - variableKey: monthly_housing_cost
                      variableValue: "1400000"
                      valueType: NUMBER
      responses:
        '201':
          description: 시나리오 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseScenarioResponse'

    get:
      tags:
        - Scenario
      summary: 시나리오 목록 조회
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: 시나리오 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseScenarioListResponse'

  /api/scenarios/{scenarioId}:
    patch:
      tags:
        - Scenario
      summary: 시나리오 수정
      parameters:
        - $ref: '#/components/parameters/ScenarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateScenarioRequest'
      responses:
        '200':
          description: 시나리오 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseScenarioResponse'

    delete:
      tags:
        - Scenario
      summary: 시나리오 삭제
      parameters:
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: 시나리오 삭제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'

  /api/simulation-sessions/{sessionId}/run:
    post:
      tags:
        - SimulationResult
      summary: 시뮬레이션 실행
      description: 저장된 온보딩과 시나리오를 기반으로 결과를 계산합니다.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunSimulationRequest'
            example:
              forceRecalculate: true
      responses:
        '200':
          description: 시뮬레이션 실행 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRunSimulationResponse'

  /api/simulation-results/{resultId}:
    get:
      tags:
        - SimulationResult
      summary: 시뮬레이션 전체 결과 조회
      parameters:
        - $ref: '#/components/parameters/ResultId'
      responses:
        '200':
          description: 결과 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSimulationResultResponse'

  /api/simulation-results/{resultId}/summary:
    get:
      tags:
        - SimulationResult
      summary: 결과 요약 조회
      parameters:
        - $ref: '#/components/parameters/ResultId'
      responses:
        '200':
          description: 결과 요약 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseResultSummaryResponse'

  /api/simulation-results/{resultId}/comparison:
    get:
      tags:
        - SimulationResult
      summary: A/B 비교 결과 조회
      parameters:
        - $ref: '#/components/parameters/ResultId'
      responses:
        '200':
          description: A/B 비교 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseComparisonResponse'

  /api/simulation-results/{resultId}/evidence:
    get:
      tags:
        - SimulationResult
      summary: 데이터 근거 조회
      parameters:
        - $ref: '#/components/parameters/ResultId'
      responses:
        '200':
          description: 데이터 근거 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEvidenceResponse'

  /api/simulation-results/{resultId}/thresholds:
    get:
      tags:
        - Threshold
      summary: 임계점 결과 조회
      parameters:
        - $ref: '#/components/parameters/ResultId'
      responses:
        '200':
          description: 임계점 결과 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseThresholdResultListResponse'

  /api/simulation-results/{resultId}/red-zones:
    get:
      tags:
        - Threshold
      summary: Red Zone 조회
      parameters:
        - $ref: '#/components/parameters/ResultId'
      responses:
        '200':
          description: Red Zone 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRedZoneListResponse'

  /api/simulation-results/{resultId}/recovery-levers:
    get:
      tags:
        - Recommendation
      summary: 회복 레버 조회
      parameters:
        - $ref: '#/components/parameters/ResultId'
      responses:
        '200':
          description: 회복 레버 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRecoveryLeverListResponse'

  /api/simulation-results/{resultId}/weekly-actions:
    get:
      tags:
        - Recommendation
      summary: 이번 주 할 일 조회
      parameters:
        - $ref: '#/components/parameters/ResultId'
      responses:
        '200':
          description: 이번 주 할 일 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWeeklyActionListResponse'

  /api/datasets:
    get:
      tags:
        - Dataset
      summary: 사용자용 데이터셋 목록 조회
      responses:
        '200':
          description: 데이터셋 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDatasetListResponse'

  /api/datasets/{datasetId}:
    get:
      tags:
        - Dataset
      summary: 사용자용 데이터셋 상세 조회
      parameters:
        - $ref: '#/components/parameters/DatasetId'
      responses:
        '200':
          description: 데이터셋 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDatasetResponse'

  /api/external-links:
    get:
      tags:
        - Content
      summary: 외부 서비스 링크 목록 조회
      parameters:
        - name: lifeStageCode
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/LifeStageCode'
          example: FAMILY
      responses:
        '200':
          description: 외부 링크 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseExternalLinkListResponse'

  /api/external-links/{linkId}/click:
    post:
      tags:
        - Content
      summary: 외부 서비스 클릭 로그 저장
      parameters:
        - name: linkId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: 외부 링크 클릭 저장 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseExternalLinkClickResponse'

  /api/admin/auth/login:
    post:
      tags:
        - AdminAuth
      summary: 관리자 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
            example:
              email: admin@pivot-seoul.com
              password: password1234
      responses:
        '200':
          description: 관리자 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminLoginResponse'

  /api/admin/auth/refresh:
    post:
      tags:
        - AdminAuth
      summary: 관리자 토큰 재발급
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: 토큰 재발급 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTokenResponse'

  /api/admin/dashboard/summary:
    get:
      tags:
        - Admin
      summary: 관리자 대시보드 요약 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 관리자 대시보드 요약 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminDashboardResponse'

  /api/admin/accounts:
    get:
      tags:
        - Admin
      summary: 관리자 계정 목록 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 관리자 계정 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminUserListResponse'

    post:
      tags:
        - Admin
      summary: 관리자 계정 생성
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminUserRequest'
      responses:
        '201':
          description: 관리자 계정 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminUserResponse'

  /api/admin/datasets:
    get:
      tags:
        - AdminDataset
      summary: 관리자 데이터셋 목록 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 관리자 데이터셋 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDatasetListResponse'

    post:
      tags:
        - AdminDataset
      summary: 데이터셋 등록
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatasetRequest'
      responses:
        '201':
          description: 데이터셋 등록 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDatasetResponse'

  /api/admin/datasets/{datasetId}:
    patch:
      tags:
        - AdminDataset
      summary: 데이터셋 수정
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DatasetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDatasetRequest'
      responses:
        '200':
          description: 데이터셋 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDatasetResponse'

  /api/admin/datasets/{datasetId}/validate:
    post:
      tags:
        - AdminDataset
      summary: 데이터셋 정합성 검사 실행
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DatasetId'
      responses:
        '200':
          description: 정합성 검사 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseValidationResultResponse'

  /api/admin/contents:
    get:
      tags:
        - AdminContent
      summary: 관리자 콘텐츠 목록 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 콘텐츠 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseContentListResponse'

