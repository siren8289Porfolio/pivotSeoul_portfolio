        riskScore:
          type: number
          example: 72.5

    ApiResponseEvidenceResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/EvidenceResponse'

    EvidenceResponse:
      type: object
      properties:
        datasets:
          type: array
          items:
            $ref: '#/components/schemas/DatasetResponse'
        calculationLogs:
          type: array
          items:
            $ref: '#/components/schemas/CalculationLogResponse'
        disclaimer:
          type: string
          example: 본 결과는 공공데이터 기반 참고용 시뮬레이션입니다.

    CalculationLogResponse:
      type: object
      properties:
        metricKey:
          type: string
          example: housing_cost_burden
        formula:
          type: string
          example: monthly_housing_cost / monthly_income
        calculatedValue:
          type: number
          example: 0.36
        datasetName:
          type: string
          example: 서울시 전월세 실거래가 데이터

    ApiResponseThresholdResultListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ThresholdResultResponse'

    ThresholdResultResponse:
      type: object
      properties:
        thresholdType:
          type: string
          example: HOUSING_COST_BURDEN
        metricName:
          type: string
          example: 주거비 부담률
        calculatedValue:
          type: number
          example: 0.36
        unit:
          type: string
          example: ratio
        status:
          $ref: '#/components/schemas/ThresholdStatus'
        isRedZone:
          type: boolean
          example: true
        judgementText:
          type: string
          example: 월 소득 대비 주거비 부담이 높은 편입니다.

    ApiResponseRedZoneListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
