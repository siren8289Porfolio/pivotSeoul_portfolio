        redZoneType:
          type: string
          example: CHILDCARE_CROWDED
        title:
          type: string
          example: 보육 접근성 부족
        description:
          type: string
          example: 현재 조건에서는 어린이집 접근성이 낮아 복직 부담이 커질 수 있습니다.
        severity:
          type: string
          example: HIGH

    ApiResponseRecoveryLeverListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/RecoveryLeverResponse'

    RecoveryLeverResponse:
