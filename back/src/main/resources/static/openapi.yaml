        datasetName:
          type: string
          example: 서울시 어린이집 현황
        sourceName:
          type: string
          example: 서울 열린데이터광장
        sourceUrl:
          type: string
          example: https://data.seoul.go.kr
        baseDate:
          type: string
          format: date
