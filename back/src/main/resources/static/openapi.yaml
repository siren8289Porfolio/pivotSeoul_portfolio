            $ref: '#/components/schemas/WeeklyActionResponse'

    ApiResponseResultSummaryResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ResultSummaryResponse'

    ResultSummaryResponse:
      type: object
      properties:
        overallStatus:
          $ref: '#/components/schemas/ThresholdStatus'
        mostRiskyMetric:
          type: string
          example: childcare_access
        oneLineJudgement:
          type: string
          example: 복직 가능성은 있으나 보육 접근성 확보가 먼저 필요합니다.

    ApiResponseComparisonResponse:
      allOf:
        - $ref: '#/components/schemas/BaseApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ComparisonResponse'

    ComparisonResponse:
      type: object
      properties:
        scenarioA:
          $ref: '#/components/schemas/ScenarioScoreResponse'
        scenarioB:
          $ref: '#/components/schemas/ScenarioScoreResponse'
        betterScenario:
          type: string
          example: COMPARE
        keyDifferences:
          type: array
          items:
            type: string
          example:
            - 주거비 부담 감소
            - 보육 접근성 증가
            - 통근 시간 증가

    ScenarioScoreResponse:
      type: object
      properties:
        scenarioTitle:
          type: string
          example: 현재 조건
        status:
