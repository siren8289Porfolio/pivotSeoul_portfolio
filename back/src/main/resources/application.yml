spring:
  application:
    name: pivotseoul-back
  flyway:
    enabled: true
    locations: classpath:db/migration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pivotseoul}
    username: ${SPRING_DATASOURCE_USERNAME:pivotseoul}
    password: ${SPRING_DATASOURCE_PASSWORD:pivotseoul}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yaml
  api-docs:
    path: /v3/api-docs

# Spring → FastAPI — simulation AiGateway가 ${pivotseoul.ai.fastapi-base-url}/api/v1/... 로 프록시
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  metrics:
    tags:
      application: pivotseoul-back

pivotseoul:
  ai:
    fastapi-base-url: ${PIVOT_FASTAPI_BASE_URL:http://127.0.0.1:8000}
    connect-timeout-ms: 5000
    read-timeout-ms: 120000
  cors:
    allowed-origins: ${PIVOT_CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
