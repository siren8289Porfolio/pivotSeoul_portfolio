spring:
  application:
    name: pivotseoul-back
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pivotseoul}
    username: ${SPRING_DATASOURCE_USERNAME:pivotseoul}
    password: ${SPRING_DATASOURCE_PASSWORD:pivotseoul}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yaml
  api-docs:
    path: /v3/api-docs
